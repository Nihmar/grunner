app-id: org.nihmar.grunner
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: grunner
finish-args:
  # Required for GUI
  - --socket=wayland
  - --socket=x11
  - --socket=session-bus
  # For file system access (needed for file search and config)
  - --filesystem=home
  # For D-Bus communication with GNOME Shell search providers
  - --share=network
  # Allow launching other applications
  - --talk-name=org.freedesktop.DBus
  # Allow opening files with xdg-open
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.OpenURI
  # Needed for system power management (optional, but app has power bar)
  - --system-talk-name=org.freedesktop.login1

modules:
  - name: grunner
    buildsystem: cargo
    build-options:
      env:
        CARGO_HOME: /run/build/grunner/cargo
      rust-channel: stable
    sources:
      - type: dir
        path: ..
    build-commands:
      # Build release binary
      - cargo build --release --verbose
      # Install binary
      - install -Dm755 target/release/grunner /app/bin/grunner
      # Install .desktop file
      - install -Dm644 flatpak/org.nihmar.grunner.desktop /app/share/applications/org.nihmar.grunner.desktop
      # Install icon
      - install -Dm644 assets/grunner.svg /app/share/icons/hicolor/scalable/apps/org.nihmar.grunner.svg
      # Install appdata
      - install -Dm644 flatpak/org.nihmar.grunner.appdata.xml /app/share/metainfo/org.nihmar.grunner.appdata.xml
    post-install:
      # Update icon cache (optional)
      - gtk-update-icon-cache -f /app/share/icons/hicolor
